<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=854, initial-scale=1">
  <title>NASA Player</title>
  <style>
    html, body {
      margin: 0;
      width: 854px;
      height: 480px;
      overflow: hidden;
      background: #000;
    }

    #wrap {
      position: relative;
      width: 854px;
      height: 480px;
      overflow: hidden;
      background: #000;
    }

    /* oversized iframe, cropped to the 854x480 viewport */
    iframe {
      position: absolute;
      left: -220px;
      top: -180px;
      width: 1400px;
      height: 1100px;
      border: 0;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <iframe
      src="https://www.nasa.gov/live/"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
